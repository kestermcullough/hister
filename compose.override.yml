# [fork] Local-build deployment overrides — kept out of upstream so rebases stay clean.
# Renames the image so a previously-pulled ghcr.io/asciimoo/hister:latest can never
# shadow our patched build. `build:` (context/target) is inherited from compose.yml.
# Deploy:   docker compose up -d --build
services:
  hister:
    image: hister:fork
    depends_on:
      - defuddle

  # [fork] Defuddle extraction sidecar (Obsidian Web Clipper's engine: defuddle/node
  # + linkedom). The Go `defuddle` extractor POSTs rendered HTML to
  # http://defuddle:3000/parse. Enable it in /hister/data/config.yml:
  #   extractors: { defuddle: { enable: true } }
  defuddle:
    build: ./defuddle-svc
    image: defuddle-svc:latest
    container_name: hister-defuddle
    restart: unless-stopped
    init: true
